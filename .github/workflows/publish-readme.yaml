name: Publish README on Confluence
on:
  push:
    branches:
      - "master"

jobs:
  publish-readme:
    name: Publish README on Confluence
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEV_INFRA_OIDC_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: 'us-east-1'
      - uses: aws-actions/aws-secretsmanager-get-secrets@v3
        with:
          secret-ids: |
            GOOGLE/DEVOPSHAZELCAST
            CONFLUENCE/DEVOPSHAZELCAST_API_TOKEN
          parse-json-secrets: true
      - uses: hazelcast/confluence-markdown-sync@master
        with:
          from: './README.md'
          to: '4774690840'
          content_prefix: "<i>Page autogenerated by <a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">\"${{ github.workflow }}\" workflow</a></i>"
          cloud: hazelcast
          user: ${{ env.GOOGLE_DEVOPSHAZELCAST_EMAIL }}
          token: ${{ env.CONFLUENCE_DEVOPSHAZELCAST_API_TOKEN }}
      - uses: hazelcast/docker-actions/slack-notification@master
        with:
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_FOR_AUTOMERGING }}
          slack-channel: "#dependabot-notifications"
